<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reaction Time — play</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/colors_and_type.css" />
  <meta name="description" content="Test your reaction time." />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Reaction Time" />
  <meta property="og:title" content="Reaction Time — play" />
  <meta property="og:description" content="Test your reaction time." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://play.kevinprk.com/reaction/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Reaction Time — play" />
  <meta name="twitter:description" content="Test your reaction time." />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: var(--kp-font-sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Stage ─────────────────────────────────────────────────────── */
    .stage {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      background: var(--kp-bg);
      color: var(--kp-fg);
    }

    /* waiting + too-soon: invert — this inversion IS the GO signal */
    .stage.waiting,
    .stage.too-soon { background: var(--kp-fg); color: var(--kp-bg); }

    /* go: snap back instantly — no transition */
    .stage.go { background: var(--kp-bg); color: var(--kp-fg); }

    /* ── Chrome ────────────────────────────────────────────────────── */
    .back {
      position: absolute;
      top: 24px; left: 28px;
      font-family: var(--kp-font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: inherit;
      opacity: 0.3;
      z-index: 5;
      transition: opacity 0.15s;
    }
    .back:hover { opacity: 0.7; }

    .pi {
      position: absolute;
      bottom: 22px; right: 28px;
      font-family: var(--kp-font-sans);
      font-size: 18px;
      opacity: 0.25;
      z-index: 5;
      user-select: none;
    }

    /* ── Center content ────────────────────────────────────────────── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }

    .state-label {
      font-family: var(--kp-font-mono);
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.4;
      height: 20px;
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    .number-wrap {
      height: clamp(80px, 14vw, 148px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .big-number {
      font-family: var(--kp-font-mono);
      font-size: clamp(80px, 14vw, 148px);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .unit {
      font-family: var(--kp-font-mono);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-top: 12px;
      height: 18px;
    }

    .hint {
      font-size: 15px;
      opacity: 0.4;
      margin-top: 24px;
      letter-spacing: -0.005em;
      height: 22px;
    }

    /* ── Bottom stats ──────────────────────────────────────────────── */
    .bottom {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    .stats-row {
      display: flex;
      align-items: center;
      gap: 24px;
      font-family: var(--kp-font-mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      opacity: 0.35;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-label { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.7; }
    .stat-val { font-size: 12px; letter-spacing: -0.02em; font-weight: 500; }

    /* ── Leaderboard ───────────────────────────────────────────────── */
    .leaderboard {
      display: none;
      position: absolute;
      right: max(40px, 5vw);
      top: 50%;
      transform: translateY(-50%);
      width: 160px;
      flex-direction: column;
      gap: 0;
      pointer-events: none;
    }
    .stage.result .leaderboard { display: flex; }

    .lb-title {
      font-family: var(--kp-font-mono);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.3;
      margin-bottom: 10px;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      gap: 6px;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px solid currentColor;
      opacity: 0.25;
      font-family: var(--kp-font-mono);
      font-size: 11px;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row.me { opacity: 0.75; font-weight: 600; }

    .lb-rank { opacity: 0.5; font-size: 10px; }
    .lb-pid  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; opacity: 0.8; }
    .lb-val  { white-space: nowrap; }

    .lb-status {
      font-family: var(--kp-font-mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      opacity: 0.25;
      margin-top: 8px;
    }

    /* On narrow screens, move leaderboard below bottom stats */
    @media (max-width: 640px) {
      .leaderboard {
        right: auto;
        top: auto;
        bottom: 130px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="stage idle" id="stage">
    <a href="/" class="back" id="backLink">← play</a>

    <div class="center">
      <div class="state-label" id="stateLabel">reaction time</div>
      <div class="number-wrap">
        <div class="big-number" id="bigNumber">--</div>
      </div>
      <div class="unit" id="unit"></div>
      <div class="hint" id="hint">click anywhere to begin</div>
    </div>

    <div class="bottom">
      <svg id="sparkline" width="76" height="40" viewBox="0 0 76 40" aria-hidden="true"></svg>
      <div class="stats-row">
        <div class="stat"><div class="stat-label">last</div><div class="stat-val" id="statLast">--</div></div>
        <div class="stat"><div class="stat-label">best</div><div class="stat-val" id="statBest">--</div></div>
        <div class="stat"><div class="stat-label">avg</div><div class="stat-val" id="statAvg">--</div></div>
      </div>
    </div>

    <div class="leaderboard" id="leaderboard">
      <div class="lb-title">global top 10</div>
      <div id="lbRows"></div>
      <div class="lb-status" id="lbStatus"></div>
    </div>

    <div class="pi">π</div>
  </div>

  <script>
    const API = 'https://play-api.kevinprk.com';

    const stage      = document.getElementById('stage');
    const stateLabel = document.getElementById('stateLabel');
    const bigNumber  = document.getElementById('bigNumber');
    const unit       = document.getElementById('unit');
    const hint       = document.getElementById('hint');
    const sparkline  = document.getElementById('sparkline');
    const statLast   = document.getElementById('statLast');
    const statBest   = document.getElementById('statBest');
    const statAvg    = document.getElementById('statAvg');
    const lbRows     = document.getElementById('lbRows');
    const lbStatus   = document.getElementById('lbStatus');
    const backLink   = document.getElementById('backLink');

    // ── Anonymous player ID ─────────────────────────────────────────
    function getOrCreatePID() {
      let pid = localStorage.getItem('kp-pid');
      if (!pid) {
        pid = crypto.randomUUID();
        localStorage.setItem('kp-pid', pid);
      }
      return pid;
    }
    const playerID = getOrCreatePID();

    let state       = 'idle';
    let startTime   = 0;
    let waitTimeout = null;
    let history     = JSON.parse(localStorage.getItem('kp-reaction') || '[]');

    // ── State machine ───────────────────────────────────────────────
    function setState(s) {
      state = s;
      stage.className = `stage ${s}`;
      render();
    }

    function render() {
      const last = history.length ? history[history.length - 1] : null;

      switch (state) {
        case 'idle':
          stateLabel.textContent = 'reaction time';
          bigNumber.textContent  = last != null ? last : '--';
          unit.textContent       = last != null ? 'ms' : '';
          hint.textContent       = 'click anywhere to begin';
          break;
        case 'waiting':
          stateLabel.textContent = 'wait...';
          bigNumber.textContent  = '';
          unit.textContent       = '';
          hint.textContent       = '';
          break;
        case 'go':
          stateLabel.textContent = 'now';
          bigNumber.textContent  = '';
          unit.textContent       = '';
          hint.textContent       = '';
          break;
        case 'result':
          stateLabel.textContent = 'reaction time';
          bigNumber.textContent  = last;
          unit.textContent       = 'ms';
          hint.textContent       = 'click to go again';
          break;
        case 'too-soon':
          stateLabel.textContent = 'too soon';
          bigNumber.textContent  = '×';
          unit.textContent       = '';
          hint.textContent       = 'click to retry';
          break;
      }

      renderSparkline();
      renderStats();
    }

    function renderStats() {
      if (!history.length) {
        statLast.textContent = '--';
        statBest.textContent = '--';
        statAvg.textContent  = '--';
        return;
      }
      const last = history[history.length - 1];
      const best = Math.min(...history);
      const avg  = Math.round(history.reduce((a, b) => a + b, 0) / history.length);
      statLast.textContent = last + 'ms';
      statBest.textContent = best + 'ms';
      statAvg.textContent  = avg  + 'ms';
    }

    function renderSparkline() {
      const H = 40, barW = 4, gap = 4, SLOW = 600;
      let html = '';
      for (let i = 0; i < 10; i++) {
        const x       = i * (barW + gap);
        const histIdx = history.length - 10 + i;
        if (histIdx >= 0) {
          const ms = history[histIdx];
          const h  = Math.max(3, Math.min(ms / SLOW, 1) * H);
          html += `<rect x="${x}" y="${H - h}" width="${barW}" height="${h}" rx="1" fill="currentColor"/>`;
        } else {
          html += `<rect x="${x}" y="${H - 2}" width="${barW}" height="2" rx="1" fill="currentColor" opacity="0.2"/>`;
        }
      }
      sparkline.innerHTML = html;
    }

    // ── API ─────────────────────────────────────────────────────────
    async function submitResult(ms) {
      try {
        await fetch(`${API}/api/results`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ game: 'reaction', player_id: playerID, value: ms }),
        });
      } catch (_) {}
    }

    async function loadLeaderboard() {
      lbStatus.textContent = 'loading...';
      lbRows.innerHTML = '';
      try {
        const res = await fetch(`${API}/api/results/reaction/leaderboard`);
        const { leaderboard } = await res.json();

        if (!leaderboard.length) {
          lbStatus.textContent = 'no entries yet';
          return;
        }

        lbRows.innerHTML = leaderboard.map(e => {
          const isMe = e.player_id === playerID;
          const shortID = e.player_id.slice(0, 8);
          return `<div class="lb-row${isMe ? ' me' : ''}">
            <span class="lb-rank">${e.rank}</span>
            <span class="lb-pid">${isMe ? 'you' : shortID}</span>
            <span class="lb-val">${e.value}ms</span>
          </div>`;
        }).join('');

        // show player's rank if not in top 10
        const inTop = leaderboard.some(e => e.player_id === playerID);
        if (!inTop) {
          const pr = await fetch(`${API}/api/results/reaction/player/${playerID}`);
          const { rank } = await pr.json();
          lbStatus.textContent = rank ? `your rank: #${rank}` : '';
        } else {
          lbStatus.textContent = '';
        }
      } catch (_) {
        lbStatus.textContent = 'could not load';
      }
    }

    // ── Game logic ──────────────────────────────────────────────────
    function startWaiting() {
      setState('waiting');
      const delay = 1500 + Math.random() * 2500;
      waitTimeout = setTimeout(() => {
        startTime = performance.now();
        setState('go');
      }, delay);
    }

    function handleClick(e) {
      if (e.target === backLink || backLink.contains(e.target)) return;

      switch (state) {
        case 'idle':
        case 'result':
        case 'too-soon':
          startWaiting();
          break;
        case 'waiting':
          clearTimeout(waitTimeout);
          setState('too-soon');
          break;
        case 'go': {
          const ms = Math.round(performance.now() - startTime);
          history.push(ms);
          if (history.length > 10) history.shift();
          localStorage.setItem('kp-reaction', JSON.stringify(history));
          setState('result');
          submitResult(ms);
          loadLeaderboard();
          break;
        }
      }
    }

    stage.addEventListener('click', handleClick);

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !e.repeat) {
        e.preventDefault();
        handleClick({ target: stage });
      }
    });

    render();
  </script>
</body>
</html>
