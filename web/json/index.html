<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JSON Prettifier — play</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/colors_and_type.css" />
  <meta name="description" content="Format, validate, and minify JSON entirely in your browser." />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JSON Prettifier" />
  <meta property="og:title" content="JSON Prettifier — play" />
  <meta property="og:description" content="Format, validate, and minify JSON entirely in your browser." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://play.kevinprk.com/json/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="JSON Prettifier — play" />
  <meta name="twitter:description" content="Format, validate, and minify JSON entirely in your browser." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--kp-bg);
      color: var(--kp-fg);
      font-family: var(--kp-font-sans);
      -webkit-font-smoothing: antialiased;
      font-size: var(--kp-text-base);
      line-height: var(--kp-leading-normal);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; background: none; border: none; color: inherit; }

    .page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ---------- Theme toggle ---------- */
    .theme-toggle {
      width: 32px; height: 32px;
      border-radius: var(--kp-radius-sm);
      display: grid; place-items: center;
      color: var(--kp-fg-2);
      transition: background var(--kp-dur-fast) var(--kp-ease), color var(--kp-dur-fast) var(--kp-ease);
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--kp-hover-bg); color: var(--kp-fg); }
    .theme-toggle svg { width: 16px; height: 16px; }

    /* ---------- Header ---------- */
    .kp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--kp-space-5) var(--kp-page-pad);
      max-width: var(--kp-content-width);
      width: 100%;
      margin: 0 auto;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: var(--kp-text-md);
      font-weight: var(--kp-weight-semi);
      letter-spacing: var(--kp-tracking-snug);
    }
    .pi-mark {
      width: 24px; height: 24px;
      border-radius: var(--kp-radius-sm);
      background: var(--kp-fg);
      color: var(--kp-bg);
      display: grid; place-items: center;
      font-size: 14px; font-weight: 500;
      flex-shrink: 0;
      text-decoration: none;
    }
    .kp-header nav {
      display: flex; align-items: center; gap: var(--kp-space-5);
      font-size: var(--kp-text-sm);
      color: var(--kp-fg-2);
    }
    .kp-header nav a { transition: color var(--kp-dur-fast) var(--kp-ease); }
    .kp-header nav a:hover { color: var(--kp-fg); }

    /* ---------- Main ---------- */
    .kp-main {
      max-width: var(--kp-content-width);
      margin: 0 auto;
      width: 100%;
      padding: var(--kp-space-7) var(--kp-page-pad) var(--kp-space-9);
      flex: 1;
    }

    .intro { margin-bottom: var(--kp-space-8); }
    .intro h1 {
      font-size: var(--kp-text-3xl);
      font-weight: var(--kp-weight-semi);
      letter-spacing: var(--kp-tracking-tight);
      line-height: var(--kp-leading-tight);
      color: var(--kp-fg);
      margin-bottom: var(--kp-space-4);
    }
    .intro p {
      font-size: var(--kp-text-md);
      line-height: var(--kp-leading-relaxed);
      color: var(--kp-fg-2);
      max-width: 56ch;
    }

    /* ---------- Input ---------- */
    .input-wrap { margin-bottom: var(--kp-space-5); }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: var(--kp-space-4);
      border: 1px solid var(--kp-border);
      border-radius: var(--kp-radius-sm);
      background: var(--kp-bg);
      color: var(--kp-fg);
      font-family: var(--kp-font-mono);
      font-size: var(--kp-text-sm);
      line-height: var(--kp-leading-relaxed);
      resize: vertical;
      outline: none;
      transition: border-color var(--kp-dur-fast) var(--kp-ease);
    }
    textarea::placeholder { color: var(--kp-fg-3); }
    textarea:focus { border-color: var(--kp-fg-2); }
    textarea.error { border-color: var(--kp-fg-2); }

    /* ---------- Controls ---------- */
    .controls {
      display: flex;
      align-items: center;
      gap: var(--kp-space-3);
      margin-bottom: var(--kp-space-5);
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 1px;
      border: 1px solid var(--kp-border);
      border-radius: var(--kp-radius-sm);
      overflow: hidden;
    }

    .indent-btn {
      font-family: var(--kp-font-mono);
      font-size: var(--kp-text-xs);
      letter-spacing: 0.04em;
      color: var(--kp-fg-3);
      padding: 6px 10px;
      background: var(--kp-bg);
      border-right: 1px solid var(--kp-border);
      transition: background var(--kp-dur-fast) var(--kp-ease), color var(--kp-dur-fast) var(--kp-ease);
      white-space: nowrap;
    }
    .indent-btn:last-child { border-right: none; }
    .indent-btn:hover { background: var(--kp-hover-bg); color: var(--kp-fg); }
    .indent-btn.active { background: var(--kp-fg); color: var(--kp-bg); }

    .action-btn {
      font-family: var(--kp-font-mono);
      font-size: var(--kp-text-xs);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--kp-fg-3);
      padding: 6px 12px;
      border: 1px solid var(--kp-border);
      border-radius: var(--kp-radius-sm);
      background: var(--kp-bg);
      transition: background var(--kp-dur-fast) var(--kp-ease), color var(--kp-dur-fast) var(--kp-ease);
      white-space: nowrap;
    }
    .action-btn:hover { background: var(--kp-hover-bg); color: var(--kp-fg); }
    .action-btn.active { background: var(--kp-fg); color: var(--kp-bg); }
    .action-btn.copied { color: var(--kp-fg-2); }

    .controls-spacer { flex: 1; }

    /* ---------- Error ---------- */
    .error-bar {
      display: none;
      align-items: center;
      gap: var(--kp-space-3);
      padding: var(--kp-space-3) var(--kp-space-4);
      border: 1px solid var(--kp-border);
      border-radius: var(--kp-radius-sm);
      margin-bottom: var(--kp-space-5);
      background: var(--kp-hover-bg);
    }
    .error-bar.visible { display: flex; }
    .error-bar svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--kp-fg-2); }
    .error-msg {
      font-family: var(--kp-font-mono);
      font-size: var(--kp-text-sm);
      color: var(--kp-fg-2);
      line-height: var(--kp-leading-relaxed);
    }

    /* ---------- Output ---------- */
    .output-wrap { position: relative; }

    .section-label {
      font-size: var(--kp-text-xs);
      font-family: var(--kp-font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--kp-fg-3);
      margin-bottom: var(--kp-space-3);
      padding-bottom: var(--kp-space-2);
      border-bottom: 1px solid var(--kp-border);
    }

    .output-block {
      width: 100%;
      min-height: 160px;
      padding: var(--kp-space-4);
      border: 1px solid var(--kp-border);
      border-radius: var(--kp-radius-sm);
      background: var(--kp-bg);
      font-family: var(--kp-font-mono);
      font-size: var(--kp-text-sm);
      line-height: var(--kp-leading-relaxed);
      overflow-x: auto;
      white-space: pre;
      tab-size: 4;
      margin-bottom: var(--kp-space-3);
    }
    .output-block.empty { color: var(--kp-fg-3); white-space: pre-wrap; }

    /* Syntax highlight classes — monochrome only */
    .j-key   { color: var(--kp-fg); }
    .j-str   { color: var(--kp-fg-2); }
    .j-num   { color: var(--kp-fg); }
    .j-bool  { color: var(--kp-fg-2); }
    .j-null  { color: var(--kp-fg-3); }
    .j-punct { color: var(--kp-fg-3); }

    /* ---------- Stats ---------- */
    .stats {
      font-family: var(--kp-font-mono);
      font-size: var(--kp-text-xs);
      color: var(--kp-fg-3);
      letter-spacing: 0.02em;
      display: flex;
      gap: var(--kp-space-4);
      flex-wrap: wrap;
    }
    .stats span { white-space: nowrap; }

    /* ---------- Footer ---------- */
    .kp-footer {
      max-width: var(--kp-content-width);
      margin: 0 auto;
      width: 100%;
      padding: var(--kp-space-6) var(--kp-page-pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--kp-text-xs);
      font-family: var(--kp-font-mono);
      color: var(--kp-fg-3);
      letter-spacing: -0.005em;
    }
    .kp-footer .pi { font-family: var(--kp-font-sans); font-size: 14px; color: var(--kp-fg-2); }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="kp-header">
        <div class="brand">
          <a href="https://kevinprk.com" class="pi-mark" aria-label="kevinprk.com">π</a>
          play
        </div>
        <nav>
          <a href="/">experiments</a>
          <a href="https://kevinprk.com">kevinprk.com</a>
          <button class="theme-toggle" id="themeToggle" aria-label="toggle theme" title="toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
            </svg>
          </button>
        </nav>
      </div>
    </header>

    <main class="kp-main">
      <section class="intro">
        <h1>JSON Prettifier</h1>
        <p>Paste any JSON to format, validate, or minify it. Everything runs entirely in your browser — your input is never sent to any server.</p>
      </section>

      <div class="input-wrap">
        <textarea id="jsonInput" placeholder='Paste JSON here… {"key": "value"}' spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <div class="controls">
        <div class="control-group" role="group" aria-label="Indentation">
          <button class="indent-btn active" data-indent="2">2 spaces</button>
          <button class="indent-btn" data-indent="4">4 spaces</button>
          <button class="indent-btn" data-indent="tab">tab</button>
        </div>
        <button class="action-btn" id="minifyBtn">Minify</button>
        <div class="controls-spacer"></div>
        <button class="action-btn" id="clearBtn">Clear</button>
        <button class="action-btn" id="copyBtn">Copy</button>
      </div>

      <div class="error-bar" id="errorBar" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
        <span class="error-msg" id="errorMsg"></span>
      </div>

      <div class="output-wrap">
        <div class="section-label">output</div>
        <div class="output-block empty" id="outputBlock" aria-live="polite">Formatted JSON will appear here.</div>
        <div class="stats" id="stats"></div>
      </div>
    </main>

    <footer>
      <div class="kp-footer">
        <span>© <span id="year"></span> kevin park</span>
        <span class="pi">π</span>
      </div>
    </footer>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ---- Theme toggle ----
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 3v1.5M12 19.5V21M3 12h1.5M19.5 12H21M5.6 5.6l1.06 1.06M17.34 17.34l1.06 1.06M5.6 18.4l1.06-1.06M17.34 6.66l1.06-1.06"/></svg>`;
    const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>`;
    let theme = localStorage.getItem('kp-theme') || 'light';
    function applyTheme(t) { html.setAttribute('data-theme', t); themeBtn.innerHTML = t === 'dark' ? sunIcon : moonIcon; localStorage.setItem('kp-theme', t); }
    applyTheme(theme);
    themeBtn.addEventListener('click', () => { theme = theme === 'light' ? 'dark' : 'light'; applyTheme(theme); });

    // ---- State ----
    const inputEl   = document.getElementById('jsonInput');
    const outputEl  = document.getElementById('outputBlock');
    const errorBar  = document.getElementById('errorBar');
    const errorMsg  = document.getElementById('errorMsg');
    const statsEl   = document.getElementById('stats');
    const copyBtn   = document.getElementById('copyBtn');
    const clearBtn  = document.getElementById('clearBtn');
    const minifyBtn = document.getElementById('minifyBtn');

    let indentValue = 2;   // 2 | 4 | '\t'
    let minifyMode  = false;
    let lastFormatted = '';
    let debounceTimer = null;

    // ---- Indent buttons ----
    document.querySelectorAll('.indent-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.indent-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        indentValue = btn.dataset.indent === 'tab' ? '\t' : Number(btn.dataset.indent);
        if (minifyMode) { minifyMode = false; minifyBtn.classList.remove('active'); }
        update();
      });
    });

    // ---- Minify toggle ----
    minifyBtn.addEventListener('click', () => {
      minifyMode = !minifyMode;
      minifyBtn.classList.toggle('active', minifyMode);
      update();
    });

    // ---- Clear ----
    clearBtn.addEventListener('click', () => {
      inputEl.value = '';
      update();
      inputEl.focus();
    });

    // ---- Copy ----
    copyBtn.addEventListener('click', () => {
      if (!lastFormatted) return;
      navigator.clipboard.writeText(lastFormatted).then(() => {
        copyBtn.textContent = 'Copied';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1500);
      }).catch(() => {});
    });

    // ---- Input ----
    inputEl.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(update, 300);
    });

    // ---- Syntax highlight ----
    function highlight(json) {
      // Escape HTML first
      const escaped = json
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      return escaped.replace(
        /("(?:[^"\\]|\\.)*")(\s*:)?|(\btrue\b|\bfalse\b)|(\bnull\b)|(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)|([{}\[\],])/g,
        (match, str, colon, bool, nil, num, punct) => {
          if (str && colon) return `<span class="j-key">${str}</span>${colon}`;
          if (str)  return `<span class="j-str">${str}</span>`;
          if (bool) return `<span class="j-bool">${bool}</span>`;
          if (nil)  return `<span class="j-null">${nil}</span>`;
          if (num)  return `<span class="j-num">${num}</span>`;
          if (punct)return `<span class="j-punct">${punct}</span>`;
          return match;
        }
      );
    }

    // ---- Count keys and max depth ----
    function analyze(parsed) {
      let keys = 0, maxDepth = 0;
      function walk(node, depth) {
        if (depth > maxDepth) maxDepth = depth;
        if (Array.isArray(node)) {
          node.forEach(v => walk(v, depth + 1));
        } else if (node !== null && typeof node === 'object') {
          for (const k of Object.keys(node)) {
            keys++;
            walk(node[k], depth + 1);
          }
        }
      }
      walk(parsed, 0);
      return { keys, maxDepth };
    }

    // ---- Main update ----
    function update() {
      const raw = inputEl.value.trim();

      if (!raw) {
        outputEl.innerHTML = 'Formatted JSON will appear here.';
        outputEl.classList.add('empty');
        inputEl.classList.remove('error');
        errorBar.classList.remove('visible');
        statsEl.innerHTML = '';
        lastFormatted = '';
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (e) {
        inputEl.classList.add('error');
        errorBar.classList.add('visible');
        errorMsg.textContent = e.message;
        outputEl.innerHTML = 'Formatted JSON will appear here.';
        outputEl.classList.add('empty');
        statsEl.innerHTML = '';
        lastFormatted = '';
        return;
      }

      inputEl.classList.remove('error');
      errorBar.classList.remove('visible');

      const indent = minifyMode ? 0 : indentValue;
      const formatted = JSON.stringify(parsed, null, indent);
      lastFormatted = formatted;

      outputEl.innerHTML = highlight(formatted);
      outputEl.classList.remove('empty');

      const { keys, maxDepth } = analyze(parsed);
      const rawBytes  = new TextEncoder().encode(raw).length;
      const fmtBytes  = new TextEncoder().encode(formatted).length;

      const parts = [];
      if (keys > 0) parts.push(`${keys.toLocaleString()} key${keys !== 1 ? 's' : ''}`);
      parts.push(`depth ${maxDepth}`);
      parts.push(`${fmtBytes.toLocaleString()} B`);
      if (fmtBytes !== rawBytes) parts.push(`(raw ${rawBytes.toLocaleString()} B)`);

      statsEl.innerHTML = parts.map(p => `<span>${p}</span>`).join('<span>·</span>');
    }
  </script>
</body>
</html>
