<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>play — kevinprk</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/colors_and_type.css" />
  <meta name="description" content="Small interactive experiments by Kevin Park." />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="play" />
  <meta property="og:title" content="play — kevinprk" />
  <meta property="og:description" content="Small interactive experiments by Kevin Park." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://play.kevinprk.com" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="play — kevinprk" />
  <meta name="twitter:description" content="Small interactive experiments by Kevin Park." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--kp-bg);
      color: var(--kp-fg);
      font-family: var(--kp-font-sans);
      -webkit-font-smoothing: antialiased;
      font-size: var(--kp-text-base);
      line-height: var(--kp-leading-normal);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; background: none; border: none; color: inherit; }

    .page { min-height: 100vh; display: flex; flex-direction: column; }

    /* ---------- Theme toggle ---------- */
    .theme-toggle {
      width: 32px; height: 32px;
      border-radius: var(--kp-radius-sm);
      display: grid; place-items: center;
      color: var(--kp-fg-2);
      transition: background var(--kp-dur-fast) var(--kp-ease), color var(--kp-dur-fast) var(--kp-ease);
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: var(--kp-hover-bg); color: var(--kp-fg); }
    .theme-toggle svg { width: 16px; height: 16px; }

    /* ---------- Header ---------- */
    .kp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--kp-space-5) var(--kp-page-pad);
      max-width: var(--kp-content-width);
      width: 100%;
      margin: 0 auto;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: var(--kp-text-md);
      font-weight: var(--kp-weight-semi);
      letter-spacing: var(--kp-tracking-snug);
    }
    .pi-mark {
      width: 24px; height: 24px;
      border-radius: var(--kp-radius-sm);
      background: var(--kp-fg);
      color: var(--kp-bg);
      display: grid; place-items: center;
      font-size: 14px; font-weight: 500;
      flex-shrink: 0;
      text-decoration: none;
    }
    .kp-header nav {
      display: flex; align-items: center; gap: var(--kp-space-5);
      font-size: var(--kp-text-sm);
      color: var(--kp-fg-2);
    }
    .kp-header nav a {
      transition: color var(--kp-dur-fast) var(--kp-ease);
    }
    .kp-header nav a:hover { color: var(--kp-fg); }

    /* ---------- Main ---------- */
    .kp-main {
      max-width: var(--kp-content-width);
      margin: 0 auto;
      width: 100%;
      padding: var(--kp-space-7) var(--kp-page-pad) var(--kp-space-9);
      flex: 1;
    }

    .intro { margin-bottom: var(--kp-space-8); }
    .intro h1 {
      font-size: var(--kp-text-3xl);
      font-weight: var(--kp-weight-semi);
      letter-spacing: var(--kp-tracking-tight);
      line-height: var(--kp-leading-tight);
      color: var(--kp-fg);
      margin-bottom: var(--kp-space-4);
    }
    .intro p {
      font-size: var(--kp-text-md);
      line-height: var(--kp-leading-relaxed);
      color: var(--kp-fg-2);
      max-width: 56ch;
    }

    .section-label {
      font-size: var(--kp-text-xs);
      font-family: var(--kp-font-mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--kp-fg-3);
      margin-bottom: var(--kp-space-3);
      padding-bottom: var(--kp-space-2);
      border-bottom: 1px solid var(--kp-border);
    }

    /* ---------- Experiment row ---------- */
    .exp-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: var(--kp-space-4);
      padding: var(--kp-space-4) var(--kp-space-3);
      border-bottom: 1px solid var(--kp-border-faint);
      cursor: pointer;
      transition: background var(--kp-dur-fast) var(--kp-ease);
      text-decoration: none;
      color: inherit;
      width: 100%;
    }
    .exp-row:hover { background: var(--kp-hover-bg); }
    .exp-row:active { background: var(--kp-press-bg); }

    .exp-glyph { font-size: 22px; line-height: 1; }

    .exp-text .name {
      font-size: var(--kp-text-md);
      font-weight: var(--kp-weight-medium);
      color: var(--kp-fg);
      letter-spacing: -0.005em;
    }
    .exp-text .desc {
      font-size: var(--kp-text-sm);
      color: var(--kp-fg-2);
      margin-top: 2px;
    }

    .exp-arrow {
      font-family: var(--kp-font-mono);
      font-size: var(--kp-text-sm);
      color: var(--kp-fg-3);
      transition: transform var(--kp-dur-fast) var(--kp-ease), color var(--kp-dur-fast) var(--kp-ease);
    }
    .exp-row:hover .exp-arrow { color: var(--kp-fg); transform: translateX(3px); }

    /* ---------- Footer ---------- */
    .kp-footer {
      max-width: var(--kp-content-width);
      margin: 0 auto;
      width: 100%;
      padding: var(--kp-space-6) var(--kp-page-pad);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--kp-text-xs);
      font-family: var(--kp-font-mono);
      color: var(--kp-fg-3);
      letter-spacing: -0.005em;
    }
    .kp-footer .pi { font-family: var(--kp-font-sans); font-size: 14px; color: var(--kp-fg-2); }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="kp-header">
        <div class="brand">
          <a href="https://kevinprk.com" class="pi-mark" aria-label="kevinprk.com">π</a>
          play
        </div>
        <nav>
          <a href="https://kevinprk.com">kevinprk.com</a>
          <button class="theme-toggle" id="themeToggle" aria-label="toggle theme" title="toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
            </svg>
          </button>
        </nav>
      </div>
    </header>

    <main class="kp-main">
      <section class="intro">
        <h1>Small experiments.</h1>
        <p>things I made for no particular reason. interactive, visual, or just odd.</p>
      </section>

      <section>
        <div class="section-label">experiments</div>
        <div role="list">
          <a href="/fire/" class="exp-row" role="listitem">
            <span class="exp-glyph">🔥</span>
            <div class="exp-text">
              <div class="name">Campfire</div>
              <div class="desc">a cozy campfire in the dark</div>
            </div>
            <span class="exp-arrow">→</span>
          </a>
          <a href="/sunny/" class="exp-row" role="listitem">
            <span class="exp-glyph">☀️</span>
            <div class="exp-text">
              <div class="name">Sunny</div>
              <div class="desc">a quiet sunny day</div>
            </div>
            <span class="exp-arrow">→</span>
          </a>
        </div>
      </section>
    </main>

    <footer>
      <div class="kp-footer">
        <span>© <span id="year"></span> kevin park</span>
        <span class="pi">π</span>
      </div>
    </footer>

  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const html = document.documentElement;
    const btn = document.getElementById("themeToggle");
    const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 3v1.5M12 19.5V21M3 12h1.5M19.5 12H21M5.6 5.6l1.06 1.06M17.34 17.34l1.06 1.06M5.6 18.4l1.06-1.06M17.34 6.66l1.06-1.06"/></svg>`;
    const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>`;

    let theme = localStorage.getItem("kp-theme") || "light";
    function applyTheme(t) {
      html.setAttribute("data-theme", t);
      btn.innerHTML = t === "dark" ? sunIcon : moonIcon;
      localStorage.setItem("kp-theme", t);
    }
    applyTheme(theme);

    btn.addEventListener("click", () => {
      theme = theme === "light" ? "dark" : "light";
      applyTheme(theme);
    });
  </script>
</body>
</html>
